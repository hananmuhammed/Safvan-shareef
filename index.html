<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f2f4f1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    background: #f9faf8;
    border-radius: 20px;
    padding: 25px;
    width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.title-small {
    text-align: center;
    letter-spacing: 2px;
    font-size: 11px;
    color: #777;
}

.title-name {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #5f7d66;
    margin: 10px 0 30px;
}

.section-text {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: #888;
    margin-bottom: 20px;
}

.couples {
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: center;
    margin-bottom: 25px;
}

.couple {
    width: 45%;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
}

.amp {
    color: #5f7d66;
}

.heart {
    color: #5f7d66;
}

.date-box {
    display: flex;
    border: 1px solid #dcdcdc;
    border-radius: 12px;
    overflow: hidden;
    margin: 20px 0;
    text-align: center;
}

.date-box div {
    flex: 1;
    padding: 10px;
}

.date-box .middle {
    font-size: 28px;
    font-weight: bold;
    color: #5f7d66;
}

.location {
    text-align: center;
    margin: 10px 0;
}

.location h3 {
    font-family: 'Playfair Display', serif;
    color: #5f7d66;
    margin: 5px 0;
}

.countdown-title {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 15px;
}

.countdown {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.box {
    background: #eee;
    border-radius: 10px;
    width: 23%;
    text-align: center;
    padding: 10px 0;
}

.box span {
    font-size: 18px;
    font-weight: bold;
}

.rsvp {
    margin-top: 20px;
}

.rsvp-title {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.rsvp-buttons {
    display: flex;
    justify-content: space-between;
}

.btn {
    width: 48%;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
}

.yes {
    border: 2px solid #bfe3c2;
    color: #4c8b5f;
}

.no {
    border: 2px solid #f0c0c0;
    color: #c86b6b;
}
</style>
</head>

<body>

<div class="card">

<div class="title-small">EXCLUSIVE INVITATION FOR</div>
<div class="title-name">Hanan Muhammed</div>

<div class="section-text">TOGETHER WITH THEIR FAMILIES</div>

<div class="couples">
    <div class="couple">
        Safvan Shareef <br><span class="amp">&</span><br> Fathima Afna
    </div>
    <div class="heart">♡</div>
</div>

<div class="section-text">REQUEST THE HONOR OF YOUR PRESENCE</div>

<div class="date-box">
    <div>DECEMBER<br>2030</div>
    <div class="middle">28</div>
    <div>04 PM</div>
</div>

<div class="location">
    <h3>MAKKAH</h3>
    <div>📍 Saudi Arabia, Jeddah</div>
</div>

<div class="countdown-title">COUNTDOWN TO RECEPTION</div>

<div class="countdown">
    <div class="box"><span id="d">0</span><br>DAYS</div>
    <div class="box"><span id="h">0</span><br>HOURS</div>
    <div class="box"><span id="m">0</span><br>MINS</div>
    <div class="box"><span id="s">0</span><br>SECS</div>
</div>

<div class="rsvp">
    <div class="rsvp-title">WILL YOU ATTEND?</div>
    <div class="rsvp-buttons">
        <div class="btn yes">✔ Yes, In Sha Allah!</div>
        <div class="btn no">✖ Can't make it</div>
    </div>
</div>

</div>

<script>
const eventDate = new Date("December 28, 2030 16:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const gap = eventDate - now;

    document.getElementById("d").innerText = Math.floor(gap / (1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
    document.getElementById("m").innerText = Math.floor((gap % (1000*60*60)) / (1000*60));
    document.getElementById("s").innerText = Math.floor((gap % (1000*60)) / 1000);
}, 1000);
</script>

</body>
</html>
